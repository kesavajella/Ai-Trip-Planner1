spring.application.name=IntelliTrip Backend
server.port=8081

# Database Configuration
spring.datasource.url=jdbc:mysql://gateway01.ap-southeast-1.prod.alicloud.tidbcloud.com:4000/intellitrip?createDatabaseIfNotExist=true&useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&enabledTLSProtocols=TLSv1.2,TLSv1.3
spring.datasource.username=3gYGxtdPv6Xzryk.root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Session Configuration
server.servlet.session.timeout=30m

# Google AI (Gemini) Configuration
google.ai.api-key=${GOOGLE_AI_API_KEY:}

# Logging
logging.level.org.springframework=INFO
logging.level.com.intellitrip=DEBUG
